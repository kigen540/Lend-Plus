{% extends "base.html" %}

{% block title %}Apply - LendPlus{% endblock %}

{% block content %}
<div class="form-container">
    <div class="progress-bar">
        <div class="fill" style="width: 25%;"></div>
    </div>
    <div class="progress-text">Step 1 of 4</div>
    
    <h2>Enter your phone number</h2>
    <p>We'll send a verification code to this number</p>
    
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="phone-prefix">
            <span>+254</span>
            <input type="tel" name="phone" placeholder="712 734 184" required value="{{ request.form.phone or '' }}">
        </div>
        <button type="submit" class="btn-primary">Continue</button>
    </form>
    
    <a href="/" class="back-link">← Back to Home</a>
</div>
{% endblock %}
