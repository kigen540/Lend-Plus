{% extends "base.html" %}

{% block title %}Apply - LendPlus{% endblock %}

{% block content %}
<div class="form-container">
    <div class="progress-bar">
        <div class="fill" style="width: 33%;"></div>
    </div>
    <div class="progress-text">Step 1 of 3</div>
    
    <h2>Enter your phone number</h2>
    <p>Select your country and enter your phone number</p>
    
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('apply') }}">
        <div class="form-group">
            <label>Select your country *</label>
            <select name="country" id="country" required class="country-select">
                <option value="">-- Select Country --</option>
                {% for key, country in countries.items() %}
                <option value="{{ key }}" {% if request.form.country == key %}selected{% endif %}>
                    {{ country.flag }} {{ country.name }} ({{ country.phone_prefix }})
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Phone number *</label>
            <div class="phone-prefix">
                <span id="phone_prefix">+254</span>
                <input type="tel" name="phone" id="phone" placeholder="712 734 184" required value="{{ request.form.phone or '' }}">
            </div>
        </div>
        
        <button type="submit" class="btn-primary">Continue</button>
    </form>
    
    <a href="/" class="back-link">← Back to Home</a>
</div>

<script>
    // Update phone prefix when country changes
    const countrySelect = document.getElementById('country');
    const phonePrefix = document.getElementById('phone_prefix');
    const phoneInput = document.getElementById('phone');
    
    const countryData = {
        {% for key, country in countries.items() %}
        '{{ key }}': '{{ country.phone_prefix }}',
        {% endfor %}
    };
    
    countrySelect.addEventListener('change', function() {
        const prefix = countryData[this.value] || '+254';
        phonePrefix.textContent = prefix;
        phoneInput.placeholder = 'Enter phone number';
        // Remove prefix from input value if present
        const currentValue = phoneInput.value;
        if (currentValue.startsWith(prefix.replace('+', ''))) {
            phoneInput.value = currentValue.replace(prefix.replace('+', ''), '');
        }
    });
</script>
{% endblock %}
